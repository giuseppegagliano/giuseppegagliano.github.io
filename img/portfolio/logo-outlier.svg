<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <!-- cluster of normal points -->
  <circle cx="250" cy="210" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="268" cy="200" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="285" cy="218" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="260" cy="230" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="278" cy="192" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="295" cy="205" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="240" cy="220" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="310" cy="215" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="270" cy="245" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="300" cy="235" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="255" cy="195" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="320" cy="225" r="5" fill="#ffffff" opacity="0.5"/>
  <!-- scattered normal points -->
  <circle cx="220" cy="250" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="335" cy="190" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="225" cy="185" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="345" cy="240" r="4" fill="#ffffff" opacity="0.3"/>
  <!-- outlier point -->
  <circle cx="410" cy="145" r="8" fill="#4fc3f7" opacity="0.95"/>
  <!-- outlier ring -->
  <circle cx="410" cy="145" r="20" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
  <circle cx="410" cy="145" r="34" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.25"/>
</svg>
