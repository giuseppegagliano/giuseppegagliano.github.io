<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <!-- wine glass -->
  <path d="M270,120 L330,120 L315,210 Q313,240 300,248 Q287,240 285,210 Z"
        fill="#4fc3f7" opacity="0.15" stroke="#4fc3f7" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- stem -->
  <line x1="300" y1="248" x2="300" y2="290" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- base -->
  <line x1="272" y1="290" x2="328" y2="290" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- wine fill inside glass -->
  <path d="M278,175 L322,175 L315,210 Q313,235 300,243 Q287,235 285,210 Z"
        fill="#4fc3f7" opacity="0.55"/>
  <!-- recommendation sparkles -->
  <circle cx="380" cy="145" r="3.5" fill="#4fc3f7" opacity="0.8"/>
  <circle cx="395" cy="168" r="2.5" fill="#4fc3f7" opacity="0.5"/>
  <circle cx="370" cy="165" r="2" fill="#4fc3f7" opacity="0.4"/>
  <circle cx="388" cy="188" r="3" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="405" cy="150" r="2" fill="#4fc3f7" opacity="0.35"/>
</svg>
